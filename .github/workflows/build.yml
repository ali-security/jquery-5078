name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download PhantomJS on Modern Host
        run: |
          echo "Downloading PhantomJS 2.1.1..."
          wget -qO phantomjs.tar.bz2 https://github.com/Medium/phantomjs/releases/download/v2.1.1/phantomjs-2.1.1-linux-x86_64.tar.bz2
          tar -xjf phantomjs.tar.bz2

      - name: Build and Test in Legacy Node 0.10 Container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            node:0.10 bash -c "
              npm config set registry https://:2014-05-22T16%3A14%3A57.222000Z@time-machines-npm.sealsecurity.io/ &&          
              npm install &&
              npm install grunt-contrib-qunit --save-dev &&
              
              echo 'Injecting pre-downloaded PhantomJS to bypass Docker root blocks...' &&
              mkdir -p node_modules/grunt-contrib-qunit/node_modules/grunt-lib-phantomjs/node_modules/phantomjs/lib/phantom/bin &&
              cp phantomjs-2.1.1-linux-x86_64/bin/phantomjs node_modules/grunt-contrib-qunit/node_modules/grunt-lib-phantomjs/node_modules/phantomjs/lib/phantom/bin/phantomjs &&
              chmod +x node_modules/grunt-contrib-qunit/node_modules/grunt-lib-phantomjs/node_modules/phantomjs/lib/phantom/bin/phantomjs &&
              
              npm test &&
              npm pack
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jquery-package
          path: jquery-*.tgz
          retention-days: 2