name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Test in Legacy Node 0.10 Container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e PHANTOMJS_CDNURL="https://github.com/Medium/phantomjs/releases/download/v1.9.19" \
            node:0.10 bash -c "
              npm config set registry https://:2014-05-22T16%3A14%3A57.222000Z@time-machines-npm.sealsecurity.io/ &&          
              npm install &&
              npm install grunt-contrib-qunit --save-dev &&
              npm test &&
              npm pack
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jquery-package
          path: jquery-*.tgz
          retention-days: 2