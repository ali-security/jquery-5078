name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Test in Legacy Node 0.10 Container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            node:0.10 bash -c "
              echo 'deb http://archive.debian.org/debian/ jessie main' > /etc/apt/sources.list &&
              echo 'Acquire::Check-Valid-Until false;' > /etc/apt/apt.conf.d/10-nocheckvalid &&
              apt-get update -y &&
              apt-get install -y bzip2 libfontconfig1 wget &&
              
              npm config set registry https://:2014-05-22T16%3A14%3A57.222000Z@time-machines-npm.sealsecurity.io/ &&          
              npm install &&
              npm install grunt-contrib-qunit --save-dev &&
              
              echo 'Manually injecting PhantomJS to bypass dead 2014 links...' &&
              wget -q https://github.com/Medium/phantomjs/releases/download/v1.9.19/phantomjs-1.9.19-linux-x86_64.tar.bz2 &&
              tar -xjf phantomjs-1.9.19-linux-x86_64.tar.bz2 &&
              mkdir -p node_modules/phantomjs/lib/phantom/bin &&
              cp phantomjs-1.9.19-linux-x86_64/bin/phantomjs node_modules/phantomjs/lib/phantom/bin/phantomjs &&
              chmod +x node_modules/phantomjs/lib/phantom/bin/phantomjs &&
              
              npm test &&
              npm pack
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jquery-package
          path: jquery-*.tgz
          retention-days: 2